<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Optics Lens Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 2px;
            margin-top: 0;
            font-size: 1.5em;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
            margin: 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #f5f5f5;
            border: 2px solid #ddd;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
            color: #333;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-btn:hover {
            border-color: #667eea;
            color: #333;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 15px;
        }

        #demand .content-grid {
            grid-template-columns: 250px 1fr;
        }

        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 15px;
            overflow: hidden;
        }

        .sidebar h2 {
            color: #333;
            margin-bottom: 12px;
            margin-top: 0;
            font-size: 1em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
            overflow: hidden;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.8em;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            max-width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            background-color: white;
            box-sizing: border-box;
        }

        .form-group select[multiple] {
            min-height: 120px;
            padding: 8px;
        }

        .form-group select[multiple] option {
            padding: 4px;
            background-color: white;
        }

        .form-group select[multiple] option:checked {
            background: linear-gradient(#667eea, #667eea);
            background-color: #667eea;
            color: white;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #764ba2;
        }

        .results {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .results-header {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .results-header h3 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
            margin-top: 0;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .stat-card label {
            display: block;
            color: #666;
            font-size: 0.75em;
            margin-bottom: 3px;
        }

        .stat-card .value {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.9em;
        }

        th {
            background: #f8f9fa;
            padding: 8px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .time-presets {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .preset-btn {
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .preset-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
            overflow: hidden;
        }

        .date-range input {
            width: 100%;
            min-width: 0;
        }

        .select-all-btn {
            width: 42px;
            height: 20px;
            padding: 0;
            font-size: 0.65em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            line-height: 1;
        }

        .select-all-btn:hover {
            background: #764ba2;
        }

        .filter-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Global Optics Lens Tracker</h1>
            <p>Real-time inventory and demand analytics for 103,123+ lens SKUs</p>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="switchTab('filter')">Filter & Search</button>
            <button class="tab-btn active" onclick="switchTab('demand')">Demand Analytics</button>
        </div>

        <!-- FILTER TAB -->
        <div id="filter" class="tab-content">
            <div class="content-grid">
                <div class="sidebar">
                    <h2>Filters</h2>
                    
                    <div class="form-group">
                        <label for="manufacturer">Manufacturer</label>
                        <select id="manufacturer" onchange="performFilter()">
                            <option value="">All Manufacturers</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="segType">Seg Type</label>
                        <select id="segType" onchange="performFilter()">
                            <option value="">All Types</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="coating">Coating</label>
                        <select id="coating" onchange="performFilter()">
                            <option value="">All Coatings</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="base">Base</label>
                        <select id="base" onchange="performFilter()">
                            <option value="">All Bases</option>
                        </select>
                    </div>

                    <button onclick="clearFilters()">Clear All</button>
                </div>

                <div class="results">
                    <div class="results-header">
                        <h3>Search Results</h3>
                        <div id="filterStats"></div>
                    </div>
                    <div id="filterResults"></div>
                </div>
            </div>
        </div>

        <!-- DEMAND TAB -->
        <div id="demand" class="tab-content active">
            <div class="content-grid">
                <div class="sidebar">
                    <h2>Demand Analytics</h2>
                    
                    <button onclick="calculateDemand()" style="margin-bottom: 15px;">Calculate Demand</button>

                    <div class="form-group">
                        <label>Time Period</label>
                        <div class="time-presets">
                            <button class="preset-btn active" onclick="setDemandPeriod('24h')">24h</button>
                            <button class="preset-btn" onclick="setDemandPeriod('7d')">7 days</button>
                            <button class="preset-btn" onclick="setDemandPeriod('1mo')">1 month</button>
                            <button class="preset-btn" onclick="setDemandPeriod('12mo')">12 months</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Custom Date Range</label>
                        <div class="date-range">
                            <input type="date" id="startDate" placeholder="From">
                            <input type="date" id="endDate" placeholder="To">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandManufacturer">Manufacturer</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandManufacturer')">All</button>
                        </div>
                        <select id="demandManufacturer" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandLensType">Lens Type</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandLensType')">All</button>
                        </div>
                        <select id="demandLensType" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandLensSubtype">Lens Subtype</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandLensSubtype')">All</button>
                        </div>
                        <select id="demandLensSubtype" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandCoating">Coating</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandCoating')">All</button>
                        </div>
                        <select id="demandCoating" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandColor">Color</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandColor')">All</button>
                        </div>
                        <select id="demandColor" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandBase">Base</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandBase')">All</button>
                        </div>
                        <select id="demandBase" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandAdd">Add</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandAdd')">All</button>
                        </div>
                        <select id="demandAdd" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandDiameter">Diameter</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandDiameter')">All</button>
                        </div>
                        <select id="demandDiameter" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandProductType">Product Type</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandProductType')">All</button>
                        </div>
                        <select id="demandProductType" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandMaterialId">Material</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandMaterialId')">All</button>
                        </div>
                        <select id="demandMaterialId" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandBrand">Brand</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandBrand')">All</button>
                        </div>
                        <select id="demandBrand" multiple></select>
                    </div>

                    <div class="form-group">
                        <div class="filter-label-row">
                            <label for="demandCountry">Country of Origin</label>
                            <button type="button" class="select-all-btn" onclick="selectAllInDropdown('demandCountry')">All</button>
                        </div>
                        <select id="demandCountry" multiple></select>
                    </div>

                    <button onclick="clearDemandFilters()" style="background: #999;">Clear Filters</button>
                </div>

                <div class="results">
                    <div class="results-header">
                        <h3>Demand Results</h3>
                        <div id="activeFilters" style="margin-top: 10px; font-size: 0.9em; color: #666;"></div>
                    </div>

                    <div class="results-stats" id="demandStats"></div>

                    <div id="topMfgResults"></div>
                    <div id="demandResults"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPeriod = '24h';
        let filterOptions = {};

        // Load filter options on page load
        async function init() {
            try {
                const response = await fetch('/api/options');
                filterOptions = await response.json();
                
                // Populate filter tab dropdowns
                populateSelect('manufacturer', filterOptions.manufacturers || []);
                populateSelect('segType', filterOptions.segTypes || []);
                populateSelect('coating', filterOptions.coatings || []);
                populateSelect('base', filterOptions.bases || []);

                // Populate demand tab multi-select dropdowns
                populateSelectOptions('demandManufacturer', filterOptions.manufacturers || []);
                populateSelectOptions('demandLensType', filterOptions.segTypes || []);
                populateSelectOptions('demandLensSubtype', filterOptions.segLenses || []);
                populateSelectOptions('demandCoating', filterOptions.coatings || []);
                populateSelectOptions('demandColor', filterOptions.colors || []);
                populateSelectOptions('demandBase', filterOptions.bases || []);
                populateSelectOptions('demandAdd', filterOptions.adds || []);
                populateSelectOptions('demandDiameter', filterOptions.diameters || []);
                populateSelectOptions('demandProductType', filterOptions.productTypes || []);
                populateSelectOptions('demandMaterialId', filterOptions.materialIds || []);
                populateSelectOptions('demandBrand', filterOptions.brands || []);
                populateSelectOptions('demandCountry', filterOptions.countries || []);
                
                // Load initial demand results
                calculateDemand();
            } catch (error) {
                console.error('Error loading options:', error);
            }
        }

        function populateSelect(id, options) {
            const select = document.getElementById(id);
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });
        }

        function populateSelectOptions(id, options) {
            const select = document.getElementById(id);
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function performFilter() {
            const params = new URLSearchParams();
            if (document.getElementById('manufacturer').value) params.append('manufacturer', document.getElementById('manufacturer').value);
            if (document.getElementById('segType').value) params.append('segType', document.getElementById('segType').value);
            if (document.getElementById('coating').value) params.append('coating', document.getElementById('coating').value);
            if (document.getElementById('base').value) params.append('base', document.getElementById('base').value);

            try {
                const response = await fetch(`/api/filter?${params}`);
                const data = await response.json();
                
                document.getElementById('filterStats').innerHTML = `
                    <div style="color: #666; font-size: 0.9em;">
                        <strong>${data.count}</strong> SKUs • <strong>${data.totalInventory}</strong> units in stock
                    </div>
                `;
                
                const resultsDiv = document.getElementById('filterResults');
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">No results found</div>';
                } else {
                    let html = '<table><thead><tr><th>SKU</th><th>Description</th><th>Inventory</th></tr></thead><tbody>';
                    data.results.forEach(item => {
                        html += `<tr>
                            <td><strong>${item.sku}</strong></td>
                            <td>${item.description}</td>
                            <td>${item.totalInventory}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    resultsDiv.innerHTML = html;
                }
            } catch (error) {
                console.error('Error filtering:', error);
            }
        }

        function clearFilters() {
            document.getElementById('manufacturer').value = '';
            document.getElementById('segType').value = '';
            document.getElementById('coating').value = '';
            document.getElementById('base').value = '';
            performFilter();
        }

        function setDemandPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function selectAllInDropdown(selectId) {
            const select = document.getElementById(selectId);
            // Select all options except empty ones
            for (let option of select.options) {
                if (option.value) {
                    option.selected = true;
                }
            }
        }

        function getSelectedMultiValues(selectId) {
            const select = document.getElementById(selectId);
            const selected = Array.from(select.selectedOptions).map(opt => opt.value);
            return selected.filter(v => v); // Remove empty values
        }

        async function calculateDemand() {
            try {
                let url = `/api/demand?period=${currentPeriod}`;
                
                // If custom dates are set, use them instead
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                if (startDate && endDate) {
                    url = `/api/demand?startDate=${startDate}&endDate=${endDate}`;
                }

                // Collect all filter values
                const filters = {
                    manufacturers: getSelectedMultiValues('demandManufacturer'),
                    lensTypes: getSelectedMultiValues('demandLensType'),
                    lensSubtypes: getSelectedMultiValues('demandLensSubtype'),
                    coatings: getSelectedMultiValues('demandCoating'),
                    colors: getSelectedMultiValues('demandColor'),
                    bases: getSelectedMultiValues('demandBase'),
                    adds: getSelectedMultiValues('demandAdd'),
                    diameters: getSelectedMultiValues('demandDiameter'),
                    productTypes: getSelectedMultiValues('demandProductType'),
                    materialIds: getSelectedMultiValues('demandMaterialId'),
                    brands: getSelectedMultiValues('demandBrand'),
                    countries: getSelectedMultiValues('demandCountry')
                };

                // Add to URL
                if (filters.manufacturers.length > 0) url += `&manufacturers=${filters.manufacturers.join(',')}`;
                if (filters.lensTypes.length > 0) url += `&segTypes=${filters.lensTypes.join(',')}`;
                if (filters.lensSubtypes.length > 0) url += `&segLenses=${filters.lensSubtypes.join(',')}`;
                if (filters.coatings.length > 0) url += `&coatings=${filters.coatings.join(',')}`;
                if (filters.colors.length > 0) url += `&colors=${filters.colors.join(',')}`;
                if (filters.bases.length > 0) url += `&bases=${filters.bases.join(',')}`;
                if (filters.adds.length > 0) url += `&adds=${filters.adds.join(',')}`;
                if (filters.diameters.length > 0) url += `&diameters=${filters.diameters.join(',')}`;
                if (filters.productTypes.length > 0) url += `&productTypes=${filters.productTypes.join(',')}`;
                if (filters.materialIds.length > 0) url += `&materialIds=${filters.materialIds.join(',')}`;
                if (filters.brands.length > 0) url += `&brands=${filters.brands.join(',')}`;
                if (filters.countries.length > 0) url += `&countries=${filters.countries.join(',')}`;

                const response = await fetch(url);
                const data = await response.json();

                // Display active filters
                let activeFiltersHtml = '';
                if (filters.manufacturers.length > 0) activeFiltersHtml += `<strong>Manufacturer:</strong> ${filters.manufacturers.join(', ')}<br>`;
                if (filters.lensTypes.length > 0) activeFiltersHtml += `<strong>Lens Type:</strong> ${filters.lensTypes.join(', ')}<br>`;
                if (filters.lensSubtypes.length > 0) activeFiltersHtml += `<strong>Lens Subtype:</strong> ${filters.lensSubtypes.join(', ')}<br>`;
                if (filters.coatings.length > 0) activeFiltersHtml += `<strong>Coating:</strong> ${filters.coatings.join(', ')}<br>`;
                if (filters.colors.length > 0) activeFiltersHtml += `<strong>Color:</strong> ${filters.colors.join(', ')}<br>`;
                if (filters.bases.length > 0) activeFiltersHtml += `<strong>Base:</strong> ${filters.bases.join(', ')}<br>`;
                if (filters.adds.length > 0) activeFiltersHtml += `<strong>Add:</strong> ${filters.adds.join(', ')}<br>`;
                if (filters.diameters.length > 0) activeFiltersHtml += `<strong>Diameter:</strong> ${filters.diameters.join(', ')}<br>`;
                if (filters.productTypes.length > 0) activeFiltersHtml += `<strong>Product Type:</strong> ${filters.productTypes.join(', ')}<br>`;
                if (filters.materialIds.length > 0) activeFiltersHtml += `<strong>Material ID:</strong> ${filters.materialIds.join(', ')}<br>`;
                if (filters.brands.length > 0) activeFiltersHtml += `<strong>Brand:</strong> ${filters.brands.join(', ')}<br>`;
                if (filters.countries.length > 0) activeFiltersHtml += `<strong>Country:</strong> ${filters.countries.join(', ')}<br>`;
                document.getElementById('activeFilters').innerHTML = activeFiltersHtml;
                
                // Display summary stats
                const statsHtml = `
                    <div class="stat-card">
                        <label>Total Demand</label>
                        <div class="value">${data.summary.totalDemand.toLocaleString()}</div>
                        <small style="color: #999;">units</small>
                    </div>
                    <div class="stat-card">
                        <label>SKUs with Demand</label>
                        <div class="value">${data.summary.skusWithDemand}</div>
                        <small style="color: #999;">products</small>
                    </div>
                    <div class="stat-card">
                        <label>Period</label>
                        <div class="value">${data.period}</div>
                        <small style="color: #999;">${new Date(data.startDate).toLocaleDateString()} - ${new Date(data.endDate).toLocaleDateString()}</small>
                    </div>
                `;
                document.getElementById('demandStats').innerHTML = statsHtml;

                // Display breakdowns dynamically in 3-column grid layout
                // Prioritize: Manufacturer, Material, Lens Type (show top 5 each)
                let breakdownHtml = '<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; margin-bottom: 30px;">';
                if (data.breakdowns) {
                    const breakdownLabels = {
                        byManufacturer: 'Top 5 Manufacturers',
                        byLensType: 'Top 5 Lens Types',
                        byLensSubtype: 'Lens Subtype',
                        byCoating: 'Coating',
                        byColor: 'Color',
                        byBase: 'Base',
                        byAdd: 'Add',
                        byDiameter: 'Diameter',
                        byProductType: 'Product Type',
                        byMaterialId: 'Top 5 Materials',
                        byBrand: 'Brand',
                        byCountry: 'Country'
                    };

                    // Priority order for default display - grid layout
                    const priorityOrder = ['byManufacturer', 'byMaterialId', 'byLensType'];
                    
                    // Render priority breakdowns in 3-column grid (top 5 each)
                    for (const breakdownKey of priorityOrder) {
                        const items = data.breakdowns[breakdownKey];
                        if (items && items.length > 0) {
                            const label = breakdownLabels[breakdownKey] || breakdownKey;
                            breakdownHtml += `<div style="border: 1px solid #ddd; border-radius: 6px; padding: 15px; background: #f9f9f9;">`;
                            breakdownHtml += `<h4 style="margin-top: 0; margin-bottom: 15px; font-size: 0.95em;">${label}</h4>`;
                            breakdownHtml += '<table style="width: 100%; font-size: 0.85em;"><thead style="display: none;"><tr><th>Name</th><th>Demand</th></tr></thead><tbody>';
                            items.slice(0, 5).forEach(item => {
                                breakdownHtml += `<tr><td style="padding: 6px 0;"><strong>${item.name}</strong></td><td style="text-align: right; padding: 6px 0;">${item.demand.toLocaleString()}</td></tr>`;
                            });
                            breakdownHtml += '</tbody></table>';
                            breakdownHtml += '</div>';
                        }
                    }

                    // Render other breakdowns if filters applied
                    for (const [breakdownKey, items] of Object.entries(data.breakdowns)) {
                        if (!priorityOrder.includes(breakdownKey) && items && items.length > 0) {
                            const label = breakdownLabels[breakdownKey] || breakdownKey;
                            breakdownHtml += `<div style="border: 1px solid #ddd; border-radius: 6px; padding: 15px; background: #f9f9f9;">`;
                            breakdownHtml += `<h4 style="margin-top: 0; margin-bottom: 15px; font-size: 0.95em;">Demand by ${label}</h4>`;
                            breakdownHtml += '<table style="width: 100%; font-size: 0.85em;"><tbody>';
                            items.forEach(item => {
                                breakdownHtml += `<tr><td style="padding: 4px 0;"><strong>${item.name}</strong></td><td style="text-align: right; padding: 4px 0;">${item.demand.toLocaleString()}</td></tr>`;
                            });
                            breakdownHtml += '</tbody></table>';
                            breakdownHtml += '</div>';
                        }
                    }
                }
                breakdownHtml += '</div>';

                // Insert breakdowns before top manufacturers section
                if (breakdownHtml) {
                    document.getElementById('topMfgResults').insertAdjacentHTML('beforebegin', breakdownHtml);
                }

                // Top manufacturers
                if (data.summary.topManufacturers && data.summary.topManufacturers.length > 0) {
                    let html = '<table><thead><tr><th>Manufacturer</th><th>Demand (units)</th></tr></thead><tbody>';
                    data.summary.topManufacturers.forEach(item => {
                        html += `<tr><td><strong>${item.manufacturer}</strong></td><td>${item.demand.toLocaleString()}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('topMfgResults').innerHTML = html;
                }

                // Top SKUs
                if (data.demand && data.demand.length > 0) {
                    let html = '<table><thead><tr><th>SKU</th><th>Description</th><th>Demand</th><th>Current Inv</th></tr></thead><tbody>';
                    data.demand.slice(0, 20).forEach(item => {
                        html += `<tr>
                            <td><strong>${item.sku}</strong></td>
                            <td>${item.description}</td>
                            <td>${item.demand.toLocaleString()}</td>
                            <td>${item.currentInventory}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('demandResults').innerHTML = html;
                } else {
                    document.getElementById('demandResults').innerHTML = '<div class="no-results">No demand data available</div>';
                }
            } catch (error) {
                console.error('Error calculating demand:', error);
                document.getElementById('demandResults').innerHTML = '<div class="no-results">Error loading demand data</div>';
            }
        }

        function clearDemandFilters() {
            document.getElementById('demandManufacturer').selectedIndex = -1;
            document.getElementById('demandLensType').selectedIndex = -1;
            document.getElementById('demandLensSubtype').selectedIndex = -1;
            document.getElementById('demandCoating').selectedIndex = -1;
            document.getElementById('demandColor').selectedIndex = -1;
            document.getElementById('demandBase').selectedIndex = -1;
            document.getElementById('demandAdd').selectedIndex = -1;
            document.getElementById('demandDiameter').selectedIndex = -1;
            document.getElementById('demandProductType').selectedIndex = -1;
            document.getElementById('demandMaterialId').selectedIndex = -1;
            document.getElementById('demandBrand').selectedIndex = -1;
            document.getElementById('demandCountry').selectedIndex = -1;
            document.getElementById('activeFilters').innerHTML = '';
            calculateDemand();
        }

        // Initialize on page load
        window.onload = init;
    </script>
</body>
</html>
