<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Optics Lens Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 2em;
        }

        .header p {
            color: #666;
            font-size: 1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-btn:hover {
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            background-color: white;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #764ba2;
        }

        .results {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .results-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .results-header h3 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .stat-card label {
            display: block;
            color: #666;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .time-presets {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .preset-btn {
            padding: 10px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .preset-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Global Optics Lens Tracker</h1>
            <p>Real-time inventory and demand analytics for 103,123+ lens SKUs</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('filter')">Filter & Search</button>
            <button class="tab-btn" onclick="switchTab('demand')">Demand Analytics</button>
        </div>

        <!-- FILTER TAB -->
        <div id="filter" class="tab-content active">
            <div class="content-grid">
                <div class="sidebar">
                    <h2>Filters</h2>
                    
                    <div class="form-group">
                        <label for="manufacturer">Manufacturer</label>
                        <select id="manufacturer" onchange="performFilter()">
                            <option value="">All Manufacturers</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="segType">Seg Type</label>
                        <select id="segType" onchange="performFilter()">
                            <option value="">All Types</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="coating">Coating</label>
                        <select id="coating" onchange="performFilter()">
                            <option value="">All Coatings</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="base">Base</label>
                        <select id="base" onchange="performFilter()">
                            <option value="">All Bases</option>
                        </select>
                    </div>

                    <button onclick="clearFilters()">Clear All</button>
                </div>

                <div class="results">
                    <div class="results-header">
                        <h3>Search Results</h3>
                        <div id="filterStats"></div>
                    </div>
                    <div id="filterResults"></div>
                </div>
            </div>
        </div>

        <!-- DEMAND TAB -->
        <div id="demand" class="tab-content">
            <div class="content-grid">
                <div class="sidebar">
                    <h2>Demand Analytics</h2>
                    
                    <div class="form-group">
                        <label>Time Period</label>
                        <div class="time-presets">
                            <button class="preset-btn active" onclick="setDemandPeriod('24h')">24h</button>
                            <button class="preset-btn" onclick="setDemandPeriod('7d')">7 days</button>
                            <button class="preset-btn" onclick="setDemandPeriod('1mo')">1 month</button>
                            <button class="preset-btn" onclick="setDemandPeriod('12mo')">12 months</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Custom Date Range</label>
                        <div class="date-range">
                            <div>
                                <label style="font-size: 0.8em; color: #999;">From</label>
                                <input type="date" id="startDate">
                            </div>
                            <div>
                                <label style="font-size: 0.8em; color: #999;">To</label>
                                <input type="date" id="endDate">
                            </div>
                        </div>
                    </div>

                    <button onclick="calculateDemand()">Calculate Demand</button>
                </div>

                <div class="results">
                    <div class="results-header">
                        <h3>Demand Results</h3>
                    </div>

                    <div class="results-stats" id="demandStats"></div>

                    <h3 style="margin-top: 30px; margin-bottom: 20px;">Top Manufacturers by Demand</h3>
                    <div id="topMfgResults"></div>

                    <h3 style="margin-top: 30px; margin-bottom: 20px;">Top 20 Most Demanded SKUs</h3>
                    <div id="demandResults"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPeriod = '24h';
        let filterOptions = {};

        // Load filter options on page load
        async function init() {
            try {
                const response = await fetch('/api/options');
                filterOptions = await response.json();
                
                // Populate dropdowns
                populateSelect('manufacturer', filterOptions.manufacturers || []);
                populateSelect('segType', filterOptions.segTypes || []);
                populateSelect('coating', filterOptions.coatings || []);
                populateSelect('base', filterOptions.bases || []);
                
                // Load initial results
                performFilter();
            } catch (error) {
                console.error('Error loading options:', error);
            }
        }

        function populateSelect(id, options) {
            const select = document.getElementById(id);
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function performFilter() {
            const params = new URLSearchParams();
            if (document.getElementById('manufacturer').value) params.append('manufacturer', document.getElementById('manufacturer').value);
            if (document.getElementById('segType').value) params.append('segType', document.getElementById('segType').value);
            if (document.getElementById('coating').value) params.append('coating', document.getElementById('coating').value);
            if (document.getElementById('base').value) params.append('base', document.getElementById('base').value);

            try {
                const response = await fetch(`/api/filter?${params}`);
                const data = await response.json();
                
                document.getElementById('filterStats').innerHTML = `
                    <div style="color: #666; font-size: 0.9em;">
                        <strong>${data.count}</strong> SKUs • <strong>${data.totalInventory}</strong> units in stock
                    </div>
                `;
                
                const resultsDiv = document.getElementById('filterResults');
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">No results found</div>';
                } else {
                    let html = '<table><thead><tr><th>SKU</th><th>Description</th><th>Inventory</th></tr></thead><tbody>';
                    data.results.forEach(item => {
                        html += `<tr>
                            <td><strong>${item.sku}</strong></td>
                            <td>${item.description}</td>
                            <td>${item.totalInventory}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    resultsDiv.innerHTML = html;
                }
            } catch (error) {
                console.error('Error filtering:', error);
            }
        }

        function clearFilters() {
            document.getElementById('manufacturer').value = '';
            document.getElementById('segType').value = '';
            document.getElementById('coating').value = '';
            document.getElementById('base').value = '';
            performFilter();
        }

        function setDemandPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function calculateDemand() {
            try {
                let url = `/api/demand?period=${currentPeriod}`;
                
                // If custom dates are set, use them instead
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                if (startDate && endDate) {
                    url = `/api/demand?startDate=${startDate}&endDate=${endDate}`;
                }

                const response = await fetch(url);
                const data = await response.json();
                
                // Display summary stats
                const statsHtml = `
                    <div class="stat-card">
                        <label>Total Demand</label>
                        <div class="value">${data.summary.totalDemand.toLocaleString()}</div>
                        <small style="color: #999;">units</small>
                    </div>
                    <div class="stat-card">
                        <label>SKUs with Demand</label>
                        <div class="value">${data.summary.skusWithDemand}</div>
                        <small style="color: #999;">products</small>
                    </div>
                    <div class="stat-card">
                        <label>Period</label>
                        <div class="value">${data.period}</div>
                        <small style="color: #999;">${new Date(data.startDate).toLocaleDateString()} - ${new Date(data.endDate).toLocaleDateString()}</small>
                    </div>
                `;
                document.getElementById('demandStats').innerHTML = statsHtml;

                // Top manufacturers
                if (data.summary.topManufacturers && data.summary.topManufacturers.length > 0) {
                    let html = '<table><thead><tr><th>Manufacturer</th><th>Demand (units)</th></tr></thead><tbody>';
                    data.summary.topManufacturers.forEach(item => {
                        html += `<tr><td><strong>${item.manufacturer}</strong></td><td>${item.demand.toLocaleString()}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('topMfgResults').innerHTML = html;
                }

                // Top SKUs
                if (data.demand && data.demand.length > 0) {
                    let html = '<table><thead><tr><th>SKU</th><th>Description</th><th>Demand</th><th>Current Inv</th></tr></thead><tbody>';
                    data.demand.slice(0, 20).forEach(item => {
                        html += `<tr>
                            <td><strong>${item.sku}</strong></td>
                            <td>${item.description}</td>
                            <td>${item.demand.toLocaleString()}</td>
                            <td>${item.currentInventory}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('demandResults').innerHTML = html;
                } else {
                    document.getElementById('demandResults').innerHTML = '<div class="no-results">No demand data available</div>';
                }
            } catch (error) {
                console.error('Error calculating demand:', error);
                document.getElementById('demandResults').innerHTML = '<div class="no-results">Error loading demand data</div>';
            }
        }

        // Initialize on page load
        window.onload = init;
    </script>
</body>
</html>
